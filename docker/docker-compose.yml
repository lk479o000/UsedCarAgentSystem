version: '3'
services:
  nginx:
    container_name: ucar-nginx
    build: .
    ports:
      - "8903:80"
    volumes:
      # 挂载静态文件目录（方便本地修改实时生效）
      - ../:/usr/share/nginx/html:ro
      # 挂载nginx配置文件（方便修改配置）
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # 挂载nginx日志目录
      - ./logs:/var/log/nginx
    restart: always
    # macOS上使用host.docker.internal访问宿主机
    extra_hosts:
      - "host.docker.internal:host-gateway"