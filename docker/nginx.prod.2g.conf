limit_req_zone $binary_remote_addr zone=api_ratelimit:10m rate=10r/s;
limit_conn_zone $binary_remote_addr zone=perip_conn:10m;

server_tokens off;

server {
  listen 80;
  server_name sjmcpitt.com www.sjmcpitt.com;

  location /.well-known/acme-challenge/ {
    root /usr/share/nginx/html;
  }

  # HTTP 入口，统一跳转到 HTTPS
  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  server_name sjmcpitt.com;

  ssl_certificate /etc/nginx/certs/www.sjmcpitt.com.pem;
  ssl_certificate_key /etc/nginx/certs/www.sjmcpitt.com.key;
  ssl_protocols TLSv1.2 TLSv1.3;

  # 统一主域名到 www，避免 SEO 与 Cookie 域混乱
  return 301 https://www.sjmcpitt.com$request_uri;
}

server {
  listen 443 ssl http2;
  server_name www.sjmcpitt.com;

  ssl_certificate /etc/nginx/certs/www.sjmcpitt.com.pem;
  ssl_certificate_key /etc/nginx/certs/www.sjmcpitt.com.key;
  ssl_protocols TLSv1.2 TLSv1.3;

  client_max_body_size 10m;

  # 基础安全头（对后台系统够用）
  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options SAMEORIGIN always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;

  # 连接数限制（防刷/慢连接）
  limit_conn perip_conn 30;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  # API 限流（正常使用几乎感知不到；恶意刷会被 429）
  location /api/ {
    limit_req zone=api_ratelimit burst=30 nodelay;

    proxy_pass http://api:8902;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 30s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
  }
}

