version: '3.8'

services:
  mysql:
    image: mysql:8.4
    container_name: ucar-mysql
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - /data/ucar/mysql:/var/lib/mysql
      - /data/ucar/mysql-init:/docker-entrypoint-initdb.d:ro
      - /data/ucar/mysql-conf:/etc/mysql/conf.d:ro
    ports:
      - "127.0.0.1:3306:3306"
    restart: unless-stopped
    # 2G 机器：给 MySQL 明确限额，避免把系统挤爆
    mem_limit: 900m
    cpus: 1.0

  api:
    build:
      context: ../ucar-api
      dockerfile: Dockerfile
    container_name: ucar-api
    environment:
      TZ: Asia/Shanghai
      NODE_ENV: production
      PORT: 8902
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${MYSQL_USER}
      DB_PASS: ${MYSQL_PASSWORD}
      DB_NAME: ${MYSQL_DATABASE}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      WX_APPID: ${WX_APPID:-}
      WX_SECRET: ${WX_SECRET:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_DIR: /app/logs
      # 2G 机器：限制 Node V8 堆，避免偶发 OOM 把整机拖死
      NODE_OPTIONS: --max-old-space-size=256
    volumes:
      - /data/ucar/logs/api:/app/logs
      - /root/ucar/ucar-api/src:/app/src
    depends_on:
      - mysql
    expose:
      - "8902"
    restart: unless-stopped
    mem_limit: 350m
    cpus: 0.8

  nginx:
    image: nginx:alpine
    container_name: ucar-nginx
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /data/ucar/www:/usr/share/nginx/html:ro
      - ./nginx.prod.2g.conf:/etc/nginx/conf.d/default.conf:ro
      - /data/ucar/certs:/etc/nginx/certs:ro
      - /data/ucar/logs/nginx:/var/log/nginx
    restart: unless-stopped
    mem_limit: 120m
    cpus: 0.3

