version: '3.8'

services:
  api:
    build: ./ucar-api
    ports:
      - "8902:8902"
    environment:
      - NODE_ENV=production
      - PORT=8902
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=ucar
      - DB_PASS=ucar_password
      - DB_NAME=ucar_db
      - JWT_SECRET=your_jwt_secret_change_in_production
      - WX_APPID=your_wechat_appid
      - WX_SECRET=your_wechat_secret
    depends_on:
      - mysql
    volumes:
      - ./logs:/app/logs

  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root_password
      - MYSQL_DATABASE=ucar_db
      - MYSQL_USER=ucar
      - MYSQL_PASSWORD=ucar_password
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d

volumes:
  mysql_data:
